defaults:
  - data: trajectory_nba_completion
  - model: trajectory_completion_ddpm_led
  - _self_

seed: 42

hardware:
  use_gpu: true
  gpu_devices: 1

wandb:
  enabled: true
  project: trajectory-completion-ddpm
  entity: null
  name: ledlike
  save_dir: ./wandb
  log_model: false

# backend: null uses wandb.enabled; set wandb|tensorboard|none to override (CLI ok).
logging:
  backend: null
  tensorboard:
    save_dir: ./tensorboard_logs
    name: null

trainer:
  lightning:
    max_epochs: 1000
    accelerator: auto
    devices: 1
    precision: 32
    log_every_n_steps: 50
    check_val_every_n_epoch: 1
    val_check_interval: null
    limit_val_batches: null
    deterministic: false
    fast_dev_run: false

  val_logging:
    enabled: true
    num_samples: 8
    log_every_n_val_epochs: 10

  optim:
    learning_rate: 0.0005
    betas: [0.9, 0.999]
    weight_decay: 0.0

  ema:
    enabled: true
    decay: 0.9999
    use_num_updates: true

hydra:
  run:
    dir: .
  output_subdir: null
