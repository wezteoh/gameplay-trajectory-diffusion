name: trajectory_completion_ddpm

trajectory_key: trajectory
context_key: context

guidance_scale: 2.0
p_uncond: 0.1

timesteps: 1000
beta_schedule: linear
linear_start: 1.0e-3
linear_end: 2.0e-2
cosine_s: 8.0e-3

parameterization: eps
loss_type: l2

backbone:
  _target_: src.modules.backbones.ledlike_backbone.LEDLikeBackbone
  past_seq_len: ${data.observed_len}
  future_seq_len: ${data.future_seq_len}
  num_agents: ${data.num_agents}
  coord_dim: ${data.coord_dim}
  context_dim: 256
  tf_layer: 2
  num_timesteps: ${..timesteps}
