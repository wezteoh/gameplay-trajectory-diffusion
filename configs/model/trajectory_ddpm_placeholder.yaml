name: trajectory_ddpm

trajectory_key: trajectory

timesteps: 1000
beta_schedule: linear
linear_start: 1.0e-4
linear_end: 2.0e-2
cosine_s: 8.0e-3

parameterization: eps
loss_type: l2

backbone:
  _target_: src.modules.backbones.placeholder_backbone.PlaceholderTrajectoryEpsilonNet
  seq_len: ${data.seq_len}
  num_agents: ${data.num_agents}
  coord_dim: ${data.coord_dim}
  hidden_dim: 512
  frequency_embedding_size: 256
