defaults:
  - data: trajectory_nba_filling
  - model: trajectory_filling_ddpm_dit
  - _self_

seed: 42

hardware:
  use_gpu: true
  gpu_devices: 1

wandb:
  enabled: true
  project: trajectory-filling-ddpm
  entity: null
  name: dit-delta-ctx-trajectory-filling
  save_dir: ./wandb
  log_model: false

logging:
  backend: null
  tensorboard:
    save_dir: ./tensorboard_logs
    name: null

trainer:
  lightning:
    max_epochs: 500
    accelerator: auto
    devices: 1
    precision: 32
    log_every_n_steps: 50
    check_val_every_n_epoch: 1
    val_check_interval: null
    limit_val_batches: null
    deterministic: false
    fast_dev_run: false

  val_logging:
    enabled: true
    num_samples: 5
    log_every_n_val_epochs: 10

  optim:
    learning_rate: 0.0001
    betas: [0.9, 0.999]
    weight_decay: 0.0

  ema:
    enabled: true
    decay: 0.9999
    use_num_updates: true

# Validation / script sampling: ancestral DDPM or DPM-Solver (see src/sampling/dpm_solver.py).
sampling:
  method: ancestral
  dpm:
    steps: 20
    order: 3
    skip_type: time_uniform
    algorithm_type: dpmsolver++
    solver_method: singlestep
    lower_order_final: true
    denoise_to_zero: false

hydra:
  run:
    dir: .
  output_subdir: null
