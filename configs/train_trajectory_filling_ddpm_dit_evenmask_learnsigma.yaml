defaults:
  - data: trajectory_nba_filling
  - model: trajectory_filling_ddpm_dit_learnsigma
  - _self_

seed: 42

hardware:
  use_gpu: true
  gpu_devices: 1

wandb:
  enabled: true
  project: trajectory-filling-ddpm
  entity: null
  name: dit-learnsigma-trajectory-filling
  save_dir: ./wandb
  log_model: false

logging:
  backend: null
  tensorboard:
    save_dir: ./tensorboard_logs
    name: null

trainer:
  lightning:
    max_epochs: 800
    accelerator: auto
    devices: 1
    precision: 32
    log_every_n_steps: 50
    check_val_every_n_epoch: 20
    val_check_interval: null
    limit_val_batches: null
    deterministic: false
    fast_dev_run: false

  val_logging:
    enabled: true
    num_samples: 5
    log_every_n_val_epochs: 1

  optim:
    learning_rate: 0.0001
    betas: [0.9, 0.999]
    weight_decay: 0.0

  ema:
    enabled: true
    decay: 0.9999
    use_num_updates: true

  checkpoint:
    monitor: val/jade_min_20frames
    mode: min

  val_trajectory_metrics:
    enabled: true
    max_samples: 512
    every_n_val_epochs: 1
    num_paths: 20
    horizon_stride: 20
    metrics_start_t: 10
    prediction_mode: pure
    guidance_scale_override: 2.0
    verbose: false
    sampling:
      method: dpm
      dpm:
        steps: 40
        order: 3
        skip_type: time_uniform
        algorithm_type: dpmsolver++
        solver_method: singlestep
        lower_order_final: true
        denoise_to_zero: false

# Validation / script sampling: ancestral, DDIM, or DPM-Solver.
sampling:
  method: ancestral
  # dpm:
  #   steps: 20
  #   order: 3
  #   skip_type: time_uniform
  #   algorithm_type: dpmsolver++
  #   solver_method: singlestep
  #   lower_order_final: true
  #   denoise_to_zero: false
  # ddim:
  #   steps: 50
  #   eta: 0.0

hydra:
  run:
    dir: .
  output_subdir: null
